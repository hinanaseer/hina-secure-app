trigger:
  - main # Jaise hi main branch par push hoga, pipeline khud chal paregi

pool:
  vmImage: 'ubuntu-latest' # Build karne ke liye Microsoft ka standard agent runner

variables:
  # Tumhare banaye huay Service Connection aur Registry ka naam
  acrServiceConnection: 'hina-acr-connection'
  repositoryName: 'hina-secure-app'
  imageTag: 'v1' # Initial version tag

stages:
- stage: BuildAndPush
  displayName: 'Build and Push Stage'
  jobs:
  - job: Build
    displayName: 'Docker Build & Registry Push'
    steps:
    
    # Task: Docker Image ko Build aur ACR par Push karna
    - task: Docker@2
      displayName: 'Build and Push to Azure Container Registry'
      inputs:
        command: 'buildAndPush'
        containerRegistry: '$(acrServiceConnection)'
        repository: '$(repositoryName)'
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(imageTag)
          latest